<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>진정성 과목추천 도우미</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="card hero-main">
        <div class="eyebrow">2022 개정 교육과정 · 학과별 과목 추천</div>
        <h1>진정성 과목추천 도우미</h1>
        <p class="desc">
          학과명만 입력하면 주요 대학의 동일 학과 및 유사 학과의 핵심 과목, 권장 과목,
          기타 추천 과목을 비교해서 보여줍니다.
        </p>

        <div class="search search-one">
          <div class="field">
            <input id="majorInput" list="majorList" placeholder="학과명 입력 (예: 화학공학과)" />
            <datalist id="majorList"></datalist>
          </div>
          <button class="btn" id="searchBtn">추천 보기</button>
        </div>

        <div class="mini">
          예시 검색: 화학공학과 · 컴퓨터공학과 · 인공지능학과 · 생명공학과
        </div>
      </div>
    </section>

    <section class="card result" id="resultArea">
      <div class="title-row">
        <h2 class="result-title">희망 학과는 무엇인가요?</h2>
        <span class="chip">학과명 검색 전용</span>
      </div>
      <p class="empty">
        학과명을 입력하면 주요 대학의 유사학과 권장과목을 표로 비교해서 보여드립니다.
      </p>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
