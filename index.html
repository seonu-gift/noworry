<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>진정성 과목추천 도우미</title>
  <style>
    :root{
      --bg1:#f8fbff;
      --bg2:#eef4ff;
      --card:#ffffffcc;
      --line:#dfe7f5;
      --text:#1f2937;
      --sub:#5b6474;
      --primary:#4f7cff;
      --primary-2:#7c9cff;
      --shadow:0 20px 60px rgba(47, 84, 170, .12);
      --radius:24px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, #ffffff 0%, #f4f8ff 35%, #edf3ff 100%);
      min-height:100vh;
    }

    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:36px 20px 60px;
    }

    .hero{
      display:grid;
      grid-template-columns:1.2fr .8fr;
      gap:20px;
      align-items:stretch;
      margin-bottom:22px;
    }

    .card{
      background:var(--card);
      backdrop-filter: blur(12px);
      border:1px solid rgba(255,255,255,.7);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    .hero-main{
      padding:34px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.88), rgba(245,249,255,.92));
    }

    .hero-side{
      padding:28px;
      background:
        linear-gradient(135deg, rgba(79,124,255,.95), rgba(124,156,255,.88));
      color:white;
      position:relative;
      overflow:hidden;
    }

    .hero-side::after{
      content:"";
      position:absolute;
      width:220px;
      height:220px;
      border-radius:50%;
      background:rgba(255,255,255,.12);
      right:-40px;
      top:-30px;
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background:#eef4ff;
      color:#3e63dd;
      font-size:13px;
      font-weight:700;
      margin-bottom:14px;
    }

    h1{
      margin:0 0 12px;
      font-size:34px;
      line-height:1.2;
      letter-spacing:-0.03em;
    }

    .desc{
      margin:0;
      color:var(--sub);
      line-height:1.7;
      font-size:16px;
    }

    .side-title{
      margin:0 0 10px;
      font-size:22px;
      font-weight:800;
    }

    .side-text{
      margin:0;
      line-height:1.7;
      color:rgba(255,255,255,.92);
    }

    .search{
      margin-top:22px;
      display:grid;
      grid-template-columns:1fr 1fr auto;
      gap:12px;
    }

    .field{
      position:relative;
    }

    .field input{
      width:100%;
      height:56px;
      border:1px solid var(--line);
      border-radius:16px;
      padding:0 16px;
      background:white;
      outline:none;
      font-size:16px;
      transition:.2s ease;
    }

    .field input:focus{
      border-color:#b9ccff;
      box-shadow:0 0 0 6px rgba(79,124,255,.10);
    }

    .btn{
      height:56px;
      border:none;
      border-radius:16px;
      padding:0 22px;
      background:linear-gradient(135deg, var(--primary), var(--primary-2));
      color:white;
      font-size:16px;
      font-weight:800;
      cursor:pointer;
      box-shadow:0 14px 30px rgba(79,124,255,.28);
      transition:transform .15s ease, box-shadow .15s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
      box-shadow:0 18px 34px rgba(79,124,255,.34);
    }

    .mini{
      margin-top:12px;
      color:var(--sub);
      font-size:14px;
    }

    .result{
      padding:28px;
    }

    .empty{
      padding:18px 0 4px;
      color:var(--sub);
      line-height:1.7;
    }

    .title-row{
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      gap:10px;
      margin-bottom:10px;
    }

    .result-title{
      font-size:28px;
      font-weight:900;
      letter-spacing:-0.02em;
      margin:0;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      padding:8px 12px;
      border-radius:999px;
      font-size:13px;
      font-weight:700;
      background:#eef4ff;
      color:#3e63dd;
    }

    .summary{
      margin:0 0 18px;
      color:var(--sub);
      line-height:1.7;
    }

    table{
      width:100%;
      border-collapse:separate;
      border-spacing:0;
      overflow:hidden;
      border:1px solid var(--line);
      border-radius:18px;
      background:white;
    }

    th, td{
      padding:16px 18px;
      border-bottom:1px solid var(--line);
      text-align:left;
      vertical-align:top;
      line-height:1.7;
    }

    tr:last-child th,
    tr:last-child td{
      border-bottom:none;
    }

    th{
      width:180px;
      background:#f7faff;
      font-size:15px;
    }

    .section{
      margin-top:24px;
    }

    .section h3{
      margin:0 0 10px;
      font-size:19px;
    }

    .reasons{
      margin:0;
      padding-left:20px;
      line-height:1.8;
    }

    .footer{
      margin-top:18px;
      padding:16px 18px;
      background:#f7faff;
      border:1px solid var(--line);
      border-radius:16px;
      color:#445065;
      line-height:1.7;
    }

    @media (max-width: 860px){
      .hero{
        grid-template-columns:1fr;
      }
      .search{
        grid-template-columns:1fr;
      }
      .btn{
        width:100%;
      }
      h1{
        font-size:28px;
      }
      .result-title{
        font-size:24px;
      }
      th{
        width:130px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="card hero-main">
        <div class="eyebrow">2022 개정 교육과정 · 과목 추천</div>
        <h1>진정성 과목추천 도우미</h1>
        <p class="desc">
          대학명과 학과명을 입력하면 전공 연계 관점에서 핵심 과목, 권장 과목,
          기타 추천 과목을 깔끔하게 확인할 수 있는 예시 페이지입니다.
        </p>

        <div class="search">
          <div class="field">
            <input id="universityInput" list="universityList" placeholder="대학명 입력 (예: 경희대학교)">
            <datalist id="universityList"></datalist>
          </div>
          <div class="field">
            <input id="majorInput" list="majorList" placeholder="학과명 입력 (예: 화학공학과)">
            <datalist id="majorList"></datalist>
          </div>
          <button class="btn" onclick="searchMajor()">추천 보기</button>
        </div>

        <div class="mini">
          예시 검색: 경희대학교 / 화학공학과 · 서울시립대학교 / 화학공학과 · 부산대학교 / 화학공학과
        </div>
      </div>

     
    </section>

    <section class="card result" id="resultArea">
      <div class="title-row">
        <h2 class="result-title">희망 학과는 무엇인가요?</h2>
        <span class="chip">샘플 데이터 포함</span>
      </div>
      <p class="empty">
        대학명과 학과명을 입력하면 결과가 여기에 표시됩니다.
      </p>
    </section>
  </div>

  <script>
    const DATA = [
      {
        university: "경희대학교",
        department: "화학공학과",
        coreSubjects: ["대수", "미적분Ⅰ", "확률과 통계", "물리학", "화학", "미적분Ⅱ", "물질과 에너지", "화학 반응의 세계"],
        recommendedSubjects: ["기하"],
        convergenceSubjects: ["역학과 에너지", "전자기와 양자"],
        reasons: [
          "화학공학은 반응공학, 공정 해석, 열역학 이해가 중요하므로 화학과 물리의 기초가 필요합니다.",
          "미적분과 확률과 통계는 공정 계산, 모델링, 데이터 해석의 기반이 됩니다.",
          "물질과 에너지, 화학 반응의 세계는 전공 적합성과 심화 탐구 흐름을 보여주는 데 도움이 됩니다."
        ]
      },
      {
        university: "서울시립대학교",
        department: "화학공학과",
        coreSubjects: ["수학(특히 미적분)", "물리", "화학"],
        recommendedSubjects: ["기하", "확률과 통계"],
        convergenceSubjects: [],
        reasons: [
          "화학공학과는 수학적 해석 능력과 물리·화학 기반 이해가 중요합니다.",
          "특히 미적분은 반응속도, 전달현상, 공정 설계와 직접 연결됩니다.",
          "물리와 화학은 전공 기초학습 역량을 보여주는 대표 과목입니다."
        ]
      },
      {
        university: "부산대학교",
        department: "화학공학과",
        coreSubjects: ["화학"],
        recommendedSubjects: ["물리학"],
        convergenceSubjects: [],
        reasons: [
          "부산대학교 화학공학과는 화학을 핵심 과목으로 제시하는 흐름을 보입니다.",
          "물리학은 공정 이해와 에너지 개념을 보완하는 데 도움이 됩니다.",
          "화학 중심의 이수 이력은 전공 적합성을 드러내는 데 유리합니다."
        ]
      }
    ];

    function normalizeText(text) {
      return (text || "")
        .replace(/\s+/g, "")
        .replace(/대학교/g, "대")
        .replace(/학부/g, "")
        .replace(/전공/g, "")
        .trim()
        .toLowerCase();
    }

    function fillDatalist() {
      const uniList = document.getElementById("universityList");
      const majorList = document.getElementById("majorList");

      const universities = [...new Set(DATA.map(x => x.university))];
      const majors = [...new Set(DATA.map(x => x.department))];

      universities.forEach(u => {
        const option = document.createElement("option");
        option.value = u;
        uniList.appendChild(option);
      });

      majors.forEach(m => {
        const option = document.createElement("option");
        option.value = m;
        majorList.appendChild(option);
      });
    }

    function formatSubjects(arr) {
      return arr && arr.length ? arr.join(", ") : "제공된 데이터 기준으로 해당 정보가 없습니다.";
    }

    function searchMajor() {
      const universityInput = document.getElementById("universityInput").value.trim();
      const majorInput = document.getElementById("majorInput").value.trim();
      const resultArea = document.getElementById("resultArea");

      if (!universityInput || !majorInput) {
        resultArea.innerHTML = `
          <div class="title-row">
            <h2 class="result-title">입력 확인</h2>
            <span class="chip">확인 필요</span>
          </div>
          <p class="empty">대학명과 학과명을 모두 입력해주세요.</p>
        `;
        return;
      }

      const normalizedUniversity = normalizeText(universityInput);
      const normalizedMajor = normalizeText(majorInput);

      const found = DATA.find(item => {
        const uniMatch =
          normalizeText(item.university).includes(normalizedUniversity) ||
          normalizedUniversity.includes(normalizeText(item.university));

        const majorMatch =
          normalizeText(item.department).includes(normalizedMajor) ||
          normalizedMajor.includes(normalizeText(item.department));

        return uniMatch && majorMatch;
      });

      if (!found) {
        resultArea.innerHTML = `
          <div class="title-row">
            <h2 class="result-title">검색 결과</h2>
            <span class="chip">데이터 없음</span>
          </div>
          <p class="empty">제공된 데이터 기준으로 해당 정보가 없습니다.</p>
          <div class="footer">
            현재는 예시 데이터가 들어 있습니다. 나중에 JSON 데이터를 연결하면 더 많은 대학과 학과를 확장할 수 있습니다.
          </div>
        `;
        return;
      }

      resultArea.innerHTML = `
        <div class="title-row">
          <h2 class="result-title">${found.university} ${found.department}</h2>
          <span class="chip">2022 개정 교육과정</span>
          <span class="chip">전공 연계 추천</span>
        </div>

        <p class="summary">
          입력한 학과를 기준으로 핵심 과목, 권장 과목, 기타 추천 과목을 정리했습니다.
        </p>

        <table>
          <tbody>
            <tr>
              <th>핵심 과목</th>
              <td>${formatSubjects(found.coreSubjects)}</td>
            </tr>
            <tr>
              <th>권장 과목</th>
              <td>${formatSubjects(found.recommendedSubjects)}</td>
            </tr>
            <tr>
              <th>기타 추천 과목</th>
              <td>${formatSubjects(found.convergenceSubjects)}</td>
            </tr>
          </tbody>
        </table>

        <div class="section">
          <h3>과목 권장 이유 및 학과 연계 설명</h3>
          <ul class="reasons">
            ${found.reasons.map(reason => `<li>${reason}</li>`).join("")}
          </ul>
        </div>

        <div class="footer">
          이상 ${found.university} ${found.department}의 권장 과목에 대해 안내해드렸습니다.
          혹시 어떤 과목 사이에서 고민 중인가요?
        </div>
      `;
    }

    fillDatalist();
  </script>
</body>
</html>
